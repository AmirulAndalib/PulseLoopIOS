name: CI

# Build the app + Live Activity extension and run the unit-test suite on a
# simulator. Everything here is hermetic: the tests use in-memory SwiftData and
# a mocked OpenAI client (api key "sk-test"), so no secrets are required.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same PR/branch to save runner minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Install xcbeautify
        run: brew install xcbeautify

      # New Xcode images on the runners don't always ship the iOS simulator
      # runtime preinstalled, so the scheme reports "no iOS Simulator destinations"
      # and a hand-picked UDID fails to match. Download the platform first so a
      # generic `platform=iOS Simulator` destination resolves reliably.
      - name: Ensure iOS simulator runtime
        run: xcodebuild -downloadPlatform iOS

      # Don't hard-code a device name/OS — Xcode image bumps rename the default
      # iPhone and change the bundled iOS version. Resolve the newest available
      # iPhone simulator and its iOS runtime from simctl after the download above.
      - name: Resolve simulator destination
        id: sim
        run: |
          xcrun simctl list runtimes
          DEST=$(xcrun simctl list devices available --json | python3 -c '
          import json, sys
          data = json.load(sys.stdin)["devices"]
          best = None
          for runtime, devices in data.items():
              if "iOS" not in runtime:
                  continue
              # runtime id looks like com.apple.CoreSimulator.SimRuntime.iOS-26-4
              ver = runtime.rsplit(".", 1)[-1].replace("iOS-", "").replace("-", ".")
              for dev in devices:
                  if dev.get("isAvailable") and dev["name"].startswith("iPhone"):
                      key = (tuple(int(p) for p in ver.split(".") if p.isdigit()), dev["name"])
                      if best is None or key > best[0]:
                          best = (key, ver, dev["name"])
          if best is None:
              sys.stderr.write("No available iPhone simulator found\n")
              sys.exit(1)
          _, ver, name = best
          print(f"platform=iOS Simulator,name={name},OS={ver}")
          ')
          echo "Using destination: $DEST"
          echo "destination=$DEST" >> "$GITHUB_OUTPUT"

      - name: Build & run tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project PulseLoop.xcodeproj \
            -scheme PulseLoop \
            -destination "${{ steps.sim.outputs.destination }}" \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            | xcbeautify --renderer github-actions
        env:
          # Belt-and-suspenders: keep tests offline even if a code path tries the network.
          OPENAI_API_KEY: sk-test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TestResults
          path: TestResults.xcresult
          if-no-files-found: ignore
